name: thisjowi
description: "A new Flutter project."
publish_to: "none"
version: 1.0.2

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.2.2
  rename: ^3.1.0
  shared_preferences: ^2.1.1
  url_launcher: ^6.3.2
  provider: ^6.0.0
  local_auth: ^3.0.1

  # Offline mode & local database (drift - compatible con todas las plataformas)
  drift: ^2.22.1
  drift_flutter: ^0.3.0
  path: ^1.9.0
  path_provider: ^2.1.1
  connectivity_plus: ^7.1.1
  uuid: ^4.5.1
  crypto: ^3.0.6
  flutter_watch_os_connectivity: ^1.0.0
  i18n_extension: ^15.1.0
  skeletonizer: ^2.1.1
  encrypt: ^5.0.3
  flutter_map: ^8.3.0
  latlong2: ^0.9.0
  mobile_scanner: ^7.1.4
  google_sign_in: ^7.2.0
  flutter_web_auth_2: ^5.0.2
  flutter_quill: ^11.5.0
  cryptography: ^2.5.0
  flutter_secure_storage: ^10.0.0

  liquid_glass_widgets: ^0.9.0
  image_picker: ^1.1.2
  intl: ^0.20.2
  logging: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/empresa.png
    - assets/removed.png
    - assets/google_logo.png
    - assets/github_logo.png
    - assets/github_logo_black.png
    - assets/terms_and_conditions.txt
    - assets/terms_and_conditions_es.txt
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
    remove_alpha_ios: false
  windows:
    generate: true
    image_path: assets/logo.png
  web:
    generate: true
    image_path: assets/logo.png
  image_path: assets/logo.png
  adaptive_icon_foreground: assets/logo.png
